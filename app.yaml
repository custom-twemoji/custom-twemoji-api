# Google Cloud configuration
# Documentation:
# - https://cloud.google.com/appengine/docs/standard/reference/app-yaml?tab=ruby#top
# - https://cloud.google.com/functions/docs/runtime-support#ruby

runtime: ruby34

entrypoint: bundle exec rackup -p $PORT

automatic_scaling:
  max_instances: 2

handlers:
- url: /.*
  script: auto
  secure: always
